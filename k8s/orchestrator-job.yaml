apiVersion: batch/v1
kind: Job
metadata:
  generateName: sweagent-orch-
  namespace: eidf230ns
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: sweagent-orchestrator
        kueue.x-k8s.io/queue-name: eidf230ns-user-queue
    spec:
      restartPolicy: Never
      securityContext:
        fsGroup: 2000
      volumes:
        - name: llm-cache
          persistentVolumeClaim:
            claimName: llm-cache-pvc
      containers:
        - name: orchestrator
          image: python:3.12-slim
          command: ["bash", "-c"]
          args:
            - |
              set -uo pipefail

              echo "=== Installing system deps ==="
              apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1
              git config --global --add safe.directory '*'
              echo "=== Installing Python deps ==="
              pip install 'swe-rex>=1.4.0' litellm datasets 2>&1 | tail -3
              cd /workspace/swe_agent && pip install -e . 2>&1 | tail -3
              cd /workspace

              echo "=== Waiting for task queue ==="
              # Wait for sidecar_manager to write task_queue.jsonl
              while [ ! -s /workspace/task_queue.jsonl ]; do
                sleep 5
              done
              echo "Task queue found"

              echo "=== Starting orchestrator ==="
              python3 -u /workspace/run_sweagent_k8s.py \
                --vllm-url http://vllm-gptoss:30002/v1 \
                --task-queue /workspace/task_queue.jsonl \
                --output-dir /workspace/results/sweagent_h200 \
                --concurrency 10 \
                --total-tasks 100 \
                --sweagent-dir /workspace/swe_agent
          env:
            - name: OPENAI_API_KEY
              value: "dummy"
            - name: PIP_BREAK_SYSTEM_PACKAGES
              value: "1"
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "4"
              memory: 16Gi
          volumeMounts:
            - name: llm-cache
              mountPath: /workspace
