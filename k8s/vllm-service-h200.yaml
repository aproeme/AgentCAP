apiVersion: batch/v1
kind: Job
metadata:
  generateName: vllm-gptoss-h200-
  namespace: eidf230ns
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: vllm-gptoss-h200
        kueue.x-k8s.io/queue-name: eidf230ns-user-queue
    spec:
      restartPolicy: Never
      nodeSelector:
        nvidia.com/gpu.present: "true"
        nvidia.com/gpu.product: NVIDIA-H200
      securityContext:
        fsGroup: 2000
      volumes:
        - name: llm-cache
          persistentVolumeClaim:
            claimName: llm-cache-pvc
      containers:
        - name: vllm
          image: ghcr.io/pytorch/pytorch:2.10.0-cuda12.9-cudnn9-devel
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euo pipefail
              cd /workspace
              . /workspace/venv_smoke/bin/activate
              pip install vllm==0.19.0 2>&1 | tail -3
              python3 -c "import vllm; print('vLLM', vllm.__version__)"
              echo "=== Starting vLLM server ==="
              exec vllm serve \
                  --model /workspace/models/unsloth/gpt-oss-120b \
                  --served-model-name openai/gpt-oss-120b \
                  --port 30002 \
                  --gpu-memory-utilization 0.88 \
                  --kv-cache-dtype fp8_e4m3 \
                  --max-model-len 131072 \
                  --max-num-seqs 32 \
                  --tool-call-parser openai \
                  --enable-auto-tool-choice
          ports:
            - containerPort: 30002
          env:
            - name: HF_HOME
              value: /workspace/hf_cache
            - name: HUGGINGFACE_HUB_CACHE
              value: /workspace/hf_cache/hub
          resources:
            requests:
              cpu: "4"
              memory: 128Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 128Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: llm-cache
              mountPath: /workspace
