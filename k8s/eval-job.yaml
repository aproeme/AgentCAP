apiVersion: batch/v1
kind: Job
metadata:
  generateName: sweagent-eval-
  namespace: eidf230ns
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: sweagent-eval-orch
        kueue.x-k8s.io/queue-name: eidf230ns-user-queue
    spec:
      restartPolicy: Never
      securityContext:
        fsGroup: 2000
      volumes:
        - name: llm-cache
          persistentVolumeClaim:
            claimName: llm-cache-pvc
      containers:
        - name: eval
          image: python:3.12-slim
          command: ["bash", "-c"]
          args:
            - |
              apt-get update -qq && apt-get install -y -qq git curl > /dev/null 2>&1
              git config --global --add safe.directory '*'
              pip install 'swe-rex>=1.4.0' datasets 2>&1 | tail -3
              
              python3 -u /workspace/eval_patches.py \
                --patches /workspace/results/sweagent_h200/patches.json \
                --eval-queue /workspace/eval_queue.jsonl \
                --output /workspace/results/sweagent_h200/eval_results.json
          env:
            - name: PIP_BREAK_SYSTEM_PACKAGES
              value: "1"
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "4"
              memory: 16Gi
          volumeMounts:
            - name: llm-cache
              mountPath: /workspace
