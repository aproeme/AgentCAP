apiVersion: batch/v1
kind: Job
metadata:
  generateName: sglang-gptoss-h200-
  namespace: eidf230ns
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: sglang-gptoss-h200
        kueue.x-k8s.io/queue-name: eidf230ns-user-queue
    spec:
      restartPolicy: Never
      nodeSelector:
        nvidia.com/gpu.present: "true"
        nvidia.com/gpu.product: NVIDIA-H200
      securityContext:
        fsGroup: 2000
      volumes:
        - name: llm-cache
          persistentVolumeClaim:
            claimName: llm-cache-pvc
      containers:
        - name: sglang
          image: ghcr.io/pytorch/pytorch:2.10.0-cuda12.9-cudnn9-devel
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euo pipefail
              apt-get update -qq && apt-get install -y -qq libnuma-dev > /dev/null 2>&1
              cd /workspace
              pip install --break-system-packages "sglang[all]==0.5.9" 2>&1 | tail -3
              python3 -c "import sglang; print('SGLang', sglang.__version__)"
              echo "=== Starting SGLang server ==="
              exec python3 -m sglang.launch_server \
                  --model-path /workspace/models/unsloth/gpt-oss-120b \
                  --served-model-name openai/gpt-oss-120b \
                  --host 0.0.0.0 \
                  --port 8000 \
                  --mem-fraction-static 0.88 \
                  --context-length 131072 \
                  --kv-cache-dtype fp8_e4m3 \
                  --enable-cache-report
          ports:
            - containerPort: 8000
          env:
            - name: HF_HOME
              value: /workspace/hf_cache
            - name: HUGGINGFACE_HUB_CACHE
              value: /workspace/hf_cache/hub
          resources:
            requests:
              cpu: "4"
              memory: 128Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 128Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: llm-cache
              mountPath: /workspace
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-gptoss-h200
  namespace: eidf230ns
spec:
  selector:
    app: sglang-gptoss-h200
  ports:
    - port: 30002
      targetPort: 8000
  type: ClusterIP
