strategy: supervisor
demo_tools: true

defaults:
  api_key: EMPTY
  max_tokens: 2048

agents:
  big:
    name: Qwen/Qwen2.5-72B-Instruct
    base_url: http://localhost:30000/v1
  small:
    name: Qwen/Qwen2.5-7B-Instruct
    base_url: http://localhost:3010{i}/v1
    replicas: 100

roles:
  supervisor: big
  worker-{i}:
    agent: small-{i}
    replicas: 100

task: "Compute (12 + 8) / 4 using the calc tool."
