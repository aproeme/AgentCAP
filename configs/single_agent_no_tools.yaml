# Single-Agent Benchmark — NO tool calls (direct patch generation)
# Model generates patch in one shot, no agentic loop.

name: single-agent-no-tools
model_id: unsloth/GPT-OSS-120b
serving_engine: vllm
base_url: http://localhost:8000

dataset: swebench_pro
dataset_count: 50
batch_sizes: [1, 2, 4, 8, 16, 32]

enable_tool_calls: false

max_tokens: 4096
temperature: 0.0
repetitions: 1

gpu_monitor_interval: 0.5
cpu_monitor_interval: 0.5
tp: 8
gpu_type: H100-80G

output_dir: results/single_agent_no_tools
